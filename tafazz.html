    <style>
        /* Offline font fallbacks */
        :root { --font-serif: 'Lora', Georgia, 'Times New Roman', serif; --font-sans: 'Nunito', 'Segoe UI', system-ui, sans-serif; }
    </style>
    <style>

        :root {
            --color-sage: #8A9A86; --color-sage-light: #B4C2AE; --color-sand: #D5CBB9;
            --color-terracotta: #C07E67; --color-cream: #F7F5F0;
            --color-brown-dark: #4A3E38; --color-brown-light: #7E6B60;
            --font-serif: 'Lora', serif; --font-sans: 'Nunito', sans-serif;
            --radius-lg: 16px; --radius-md: 12px; --radius-full: 9999px; --transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-sans); background-color: var(--color-cream); color: var(--color-brown-dark); line-height: 1.6; overflow-x: hidden; }
        h1,h2,h3,h4 { font-family: var(--font-serif); font-weight: 500; color: var(--color-brown-dark); }
        a { text-decoration: none; color: inherit; transition: var(--transition); }
        ul { list-style: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 28px; border-radius: var(--radius-full); font-family: var(--font-sans); font-weight: 600; font-size: 1rem; border: none; cursor: pointer; transition: var(--transition); }
        .btn-primary { background-color: var(--color-sage); color: white; }
        .btn-primary:hover { background-color: var(--color-brown-dark); color: var(--color-cream); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(138,154,134,.4); }
        .btn-outline { background-color: transparent; border: 1.5px solid var(--color-brown-dark); color: var(--color-brown-dark); }
        .btn-outline:hover { background-color: var(--color-brown-dark); color: var(--color-cream); }
        .btn-icon { width: 44px; height: 44px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; background-color: rgba(247,245,240,.92); color: var(--color-brown-dark); border: none; cursor: pointer; transition: var(--transition); font-size: 1.1rem; }
        .btn-icon:hover { background-color: white; transform: scale(1.08); }
        .btn-icon.favorited { background-color: var(--color-terracotta); color: white; }
        /* NAVBAR */
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 20px 0; transition: var(--transition); }
        .navbar.scrolled { background-color: rgba(247,245,240,.96); backdrop-filter: blur(10px); padding: 12px 0; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; letter-spacing: -0.5px; cursor: pointer; user-select: none; }
        .nav-links { display: flex; gap: 32px; }
        .nav-links a { font-size: 1rem; font-weight: 600; position: relative; cursor: pointer; }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background-color: var(--color-sage); transition: var(--transition); }
        .nav-links a:hover::after { width: 100%; }
        .nav-icons { display: flex; gap: 8px; align-items: center; }
        .nav-icon-btn { cursor: pointer; background: none; border: none; font-family: var(--font-sans); font-weight: 600; font-size: .9rem; color: var(--color-brown-dark); position: relative; padding: 6px 10px; border-radius: var(--radius-full); transition: var(--transition); }
        .nav-icon-btn:hover { color: var(--color-sage); background: rgba(138,154,134,.1); }
        .badge { position: absolute; top: -3px; right: -3px; background: var(--color-terracotta); color: white; border-radius: 50%; width: 17px; height: 17px; font-size: .62rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--color-brown-dark); border-radius: 2px; }
        /* MOBILE NAV */
        .mobile-nav { display: none; position: fixed; inset: 0; background: var(--color-cream); z-index: 2500; flex-direction: column; align-items: center; justify-content: center; gap: 28px; }
        .mobile-nav.open { display: flex; animation: fadeIn .2s ease; }
        .mobile-nav a { font-size: 2rem; font-family: var(--font-serif); cursor: pointer; }
        .mobile-nav-close { position: absolute; top: 24px; right: 24px; font-size: 2rem; background: none; border: none; cursor: pointer; color: var(--color-brown-dark); }
        /* SEARCH */
        .search-overlay { position: fixed; inset: 0; background: rgba(74,62,56,.65); z-index: 3000; display: flex; align-items: flex-start; justify-content: center; padding-top: 90px; animation: fadeIn .2s ease; }
        .search-box { width: 90%; max-width: 600px; background: white; border-radius: var(--radius-lg); padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
        .search-input-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-input { flex: 1; padding: 13px 18px; border: 1.5px solid var(--color-sand); border-radius: var(--radius-full); font-family: var(--font-sans); font-size: 1rem; outline: none; }
        .search-input:focus { border-color: var(--color-sage); }
        .search-results { max-height: 320px; overflow-y: auto; }
        .search-item { display: flex; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--color-sand); cursor: pointer; transition: var(--transition); border-radius: 8px; }
        .search-item:hover { background: var(--color-cream); padding-left: 8px; }
        .search-item img { width: 54px; height: 68px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .search-empty { color: var(--color-brown-light); text-align: center; padding: 24px; }
        /* HERO */
        .hero { min-height: 100vh; position: relative; display: flex; align-items: center; padding-top: 80px; overflow: hidden; }
        .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right,rgba(247,245,240,.93) 0%,rgba(247,245,240,.3) 100%); z-index: -1; }
        .hero-content { max-width: 600px; animation: fadeUp 1s ease-out forwards; }
        .hero h1 { font-size: 4.5rem; line-height: 1.1; margin-bottom: 24px; }
        .hero p { font-size: 1.2rem; margin-bottom: 40px; color: var(--color-brown-light); max-width: 480px; }
        .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; }
        /* TRUST */
        .trust-bar { background-color: var(--color-sage); color: white; padding: 22px 0; }
        .trust-container { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
        .trust-item { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: .92rem; }
        /* MISSION */
        .mission { padding: 100px 0; text-align: center; background-color: var(--color-cream); }
        .mission-content { max-width: 800px; margin: 0 auto; }
        .mission p.subtitle { color: var(--color-terracotta); text-transform: uppercase; letter-spacing: 2px; font-size: .85rem; font-weight: 700; margin-bottom: 16px; }
        .mission h2 { font-size: 3rem; line-height: 1.2; margin-bottom: 32px; }
        .mission-text { font-size: 1.1rem; color: var(--color-brown-light); margin-bottom: 40px; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 32px; margin-top: 64px; }
        .feature-card { background: white; padding: 40px; border-radius: var(--radius-lg); text-align: center; transition: var(--transition); }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,.06); }
        .feature-icon { width: 64px; height: 64px; background: var(--color-sage-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 1.6rem; }
        .feature-title { font-size: 1.2rem; margin-bottom: 16px; }
        .feature-text { color: var(--color-brown-light); font-size: .95rem; }
        /* COLLECTION */
        .collection { padding: 80px 0 120px; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; }
        .section-header h2 { font-size: 2.5rem; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 40px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 36px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; border-radius: var(--radius-full); font-family: var(--font-sans); font-weight: 600; font-size: .88rem; border: 1.5px solid var(--color-sand); background: white; cursor: pointer; transition: var(--transition); color: var(--color-brown-dark); }
        .filter-btn:hover,.filter-btn.active { background: var(--color-sage); border-color: var(--color-sage); color: white; }
        /* PRODUCT CARD */
        .product-card { position: relative; border-radius: var(--radius-lg); overflow: hidden; background: white; transition: var(--transition); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(74,62,56,.1); }
        .product-image-wrap { position: relative; aspect-ratio: 4/5; overflow: hidden; }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform .6s ease; }
        .product-card:hover .product-image { transform: scale(1.05); }
        .product-badge { position: absolute; top: 16px; left: 16px; background: white; color: var(--color-sage); padding: 6px 12px; border-radius: var(--radius-full); font-size: .78rem; font-weight: 700; letter-spacing: 1px; }
        .product-actions { position: absolute; bottom: 16px; right: 16px; display: flex; gap: 8px; opacity: 0; transform: translateY(10px); transition: var(--transition); }
        .product-card:hover .product-actions { opacity: 1; transform: translateY(0); }
        .product-info { padding: 20px 24px 24px; }
        .product-category { font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--color-sage); font-weight: 700; margin-bottom: 4px; }
        .product-title { font-family: var(--font-sans); font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
        .product-price { color: var(--color-brown-light); font-weight: 600; }
        /* PAGE HEADER */
        .page-header { height: 400px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; padding-top: 60px; }
        /* PRODUCT DETAIL */
        .pdp-wrap { padding-top: 100px; min-height: 100vh; }
        .pdp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; padding: 48px 0 100px; }
        .pdp-image { border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/5; }
        .pdp-image img { width: 100%; height: 100%; object-fit: cover; }
        .pdp-info { position: sticky; top: 100px; }
        .pdp-category { font-size: .78rem; text-transform: uppercase; letter-spacing: 2px; color: var(--color-sage); font-weight: 700; margin-bottom: 12px; }
        .pdp-title { font-size: 2.2rem; margin-bottom: 12px; }
        .pdp-price { font-size: 1.4rem; color: var(--color-brown-light); font-weight: 700; margin-bottom: 28px; }
        .pdp-desc { color: var(--color-brown-light); line-height: 1.8; margin-bottom: 32px; font-size: 1rem; }
        .size-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .size-btn { padding: 10px 18px; border: 1.5px solid var(--color-sand); border-radius: var(--radius-md); background: white; cursor: pointer; font-family: var(--font-sans); font-weight: 600; transition: var(--transition); font-size: .9rem; }
        .size-btn:hover,.size-btn.active { border-color: var(--color-brown-dark); background: var(--color-brown-dark); color: white; }
        .pdp-actions { display: flex; gap: 14px; margin-bottom: 32px; }
        .pdp-actions .btn { flex: 1; }
        .pdp-meta { display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--color-sand); padding-top: 28px; }
        .pdp-meta-item { display: flex; align-items: flex-start; gap: 12px; font-size: .92rem; color: var(--color-brown-light); }
        .pdp-meta-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
        .reviews-section { padding: 60px 0 100px; border-top: 1px solid var(--color-sand); }
        .review-card { background: white; border-radius: var(--radius-md); padding: 24px; margin-bottom: 20px; }
        .review-stars { color: #e6a817; margin-bottom: 8px; font-size: 1rem; }
        .review-author { font-weight: 700; font-size: .9rem; }
        .review-date { font-size: .8rem; color: var(--color-brown-light); }
        /* FOOTER */
        .footer { background-color: var(--color-brown-dark); color: var(--color-cream); padding: 80px 0 40px; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 64px; margin-bottom: 64px; }
        .footer-logo { font-family: var(--font-serif); font-size: 2.5rem; color: white; margin-bottom: 24px; display: block; cursor: pointer; }
        .footer-text { color: rgba(247,245,240,.7); margin-bottom: 24px; max-width: 300px; }
        .social-links { display: flex; gap: 14px; }
        .social-link { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; transition: var(--transition); font-weight: 700; font-size: .8rem; color: white; text-decoration: none; }
        .social-link:hover { background: var(--color-sage); }
        .footer h4 { color: white; font-family: var(--font-sans); font-size: 1.05rem; margin-bottom: 24px; }
        .footer-links li { margin-bottom: 12px; }
        .footer-links a { color: rgba(247,245,240,.7); cursor: pointer; }
        .footer-links a:hover { color: white; }
        .newsletter-form { display: flex; margin-top: 16px; }
        .newsletter-input { flex: 1; padding: 12px 16px; border: none; border-radius: var(--radius-full) 0 0 var(--radius-full); background: rgba(255,255,255,.1); color: white; outline: none; font-family: var(--font-sans); }
        .newsletter-input::placeholder { color: rgba(255,255,255,.5); }
        .newsletter-btn { padding: 12px 22px; border: none; background: var(--color-sage); color: white; border-radius: 0 var(--radius-full) var(--radius-full) 0; cursor: pointer; font-weight: 600; transition: var(--transition); font-size: 1rem; }
        .newsletter-btn:hover { background: white; color: var(--color-sage); }
        .footer-bottom { border-top: 1px solid rgba(255,255,255,.1); padding-top: 32px; display: flex; justify-content: space-between; align-items: center; color: rgba(247,245,240,.5); font-size: .88rem; flex-wrap: wrap; gap: 12px; }
        .footer-bottom a { color: rgba(247,245,240,.5); cursor: pointer; }
        .footer-bottom a:hover { color: white; }
        /* TOASTS */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 5000; display: flex; flex-direction: column; gap: 12px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 4000; display: flex; align-items: center; justify-content: center; }
